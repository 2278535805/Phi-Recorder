name: Phi Recorder CI
on:
  push:
    branches:
      - '*'
    paths:
      - 'src/**'
      - 'src-tauri/src/**'
      - 'src-tauri/config.toml'
      - '.github/workflows/debug.yaml'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
            target: ''
            os: linux
            arch: x86_64
          - platform: windows-latest
            args: ''
            target: ''
            os: windows
            arch: x86_64
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
            os: macos
            arch: arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
            os: macos
            arch: x86_64
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev libssl-dev pkg-config libswresample-dev

      - name: Install dependencies (macOS only)
        if: startsWith(matrix.platform, 'macos-')
        run: |
          brew install libsoup webkit2gtk openssl

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-all-crates: "true"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install frontend dependencies
        run: pnpm install

      # macOS 代码签名设置
      - name: Setup macOS code signing
        if: startsWith(matrix.platform, 'macos-')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建并配置临时钥匙链用于代码签名
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          
          # 导入开发证书
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          
          # 配置钥匙链参数
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          
          # 显示可用证书
          security find-identity -v -p codesigning build.keychain
          
          # 清理临时文件
          rm -f certificate.p12

      - name: Get macOS signing identity
        if: startsWith(matrix.platform, 'macos-')
        id: get-signing-identity
        run: |
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Error: No Developer ID Application certificate found"
            security find-identity -v -p codesigning build.keychain
            exit 1
          fi
          echo "signing_identity=$SIGNING_IDENTITY" >> $GITHUB_OUTPUT
          echo "Found signing identity: $SIGNING_IDENTITY"

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 签名环境变量
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos-') && steps.get-signing-identity.outputs.signing_identity || '' }}
          APPLE_CERTIFICATE: ${{ startsWith(matrix.platform, 'macos-') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ startsWith(matrix.platform, 'macos-') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          # Tauri 配置
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          # 启用代码签名
          tauriScript: 'pnpm tauri'
          includeDebug: false
          includeUpdaterJson: true

      - name: Clean up macOS keychain
        if: startsWith(matrix.platform, 'macos-') && always()
        run: |
          security delete-keychain build.keychain || true

      - name: Upload Windows Installer (x86_64)
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'windows-latest' && matrix.arch == 'x86_64'
        with:
          name: windows-x86_64-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload Linux Installer (x86_64)
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'ubuntu-24.04' && matrix.arch == 'x86_64'
        with:
          name: linux-x86_64-installer
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 7

      - name: Upload macOS Installer (Intel)
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'macos-latest' && matrix.arch == 'x86_64'
        with:
          name: macos-x86_64-installer
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.zip
          retention-days: 7

      - name: Upload macOS Installer (Apple Silicon)
        uses: actions/upload-artifact@v4
        if: matrix.platform == 'macos-latest' && matrix.arch == 'arm64'
        with:
          name: macos-arm64-installer
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.zip
          retention-days: 7